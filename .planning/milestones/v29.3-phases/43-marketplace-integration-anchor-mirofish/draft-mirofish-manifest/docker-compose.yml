version: "3.7"
services:
  server:
    image: ghcr.io/utopusc/mirofish:v29.3
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - "${APP_DATA_DIR}/data:/app/data"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
