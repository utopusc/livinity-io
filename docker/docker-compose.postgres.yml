version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: livos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: livos
      POSTGRES_PASSWORD: LivPostgres2024!
      POSTGRES_DB: livos
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - /opt/livos/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U livos -d livos']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
